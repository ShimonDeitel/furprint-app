name: Furprint
options:
  bundleIdPrefix: com.shimondeitel.gotchaday
  deploymentTarget:
    iOS: "17.0"
  createIntermediateGroups: true
  groupSortPosition: top
settings:
  base:
    MARKETING_VERSION: "1.0"
    CURRENT_PROJECT_VERSION: "1"
    SWIFT_VERSION: "5.0"
    DEVELOPMENT_TEAM: "W7Q885Q59C"
    CODE_SIGN_STYLE: Automatic
    IPHONEOS_DEPLOYMENT_TARGET: "17.0"
    TARGETED_DEVICE_FAMILY: "1"
    ENABLE_USER_SCRIPT_SANDBOXING: "YES"
targets:
  Furprint:
    type: application
    platform: iOS
    sources:
      - path: Furprint
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.shimondeitel.gotchaday
        TARGETED_DEVICE_FAMILY: "1"
        INFOPLIST_FILE: Furprint/Info.plist
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        ASSETCATALOG_COMPILER_GLOBAL_ACCENT_COLOR_NAME: AccentColor
        ENABLE_PREVIEWS: "YES"
        GENERATE_INFOPLIST_FILE: "NO"
  FurprintTests:
    type: bundle.unit-test
    platform: iOS
    sources:
      - path: FurprintTests
      - path: Furprint.storekit
    dependencies:
      - target: Furprint
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.shimondeitel.gotchaday.tests
        GENERATE_INFOPLIST_FILE: "YES"
        TARGETED_DEVICE_FAMILY: "1"
  FurprintUITests:
    type: bundle.ui-testing
    platform: iOS
    sources:
      - path: FurprintUITests
    dependencies:
      - target: Furprint
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.shimondeitel.gotchaday.uitests
        GENERATE_INFOPLIST_FILE: "YES"
        TARGETED_DEVICE_FAMILY: "1"
schemes:
  Furprint:
    build:
      targets:
        Furprint: all
        FurprintTests: [test]
        FurprintUITests: [test]
    run:
      config: Debug
      storeKitConfiguration: Furprint.storekit
    test:
      config: Debug
      storeKitConfiguration: Furprint.storekit
      targets:
        - FurprintTests
        - FurprintUITests
    archive:
      config: Release
